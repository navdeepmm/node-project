apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-app
  template:
    metadata:
      labels:
        app: nodejs-app
    spec:
      containers:
      - name: nodejs-app
        # Update this line to match your Jenkins IMAGE_NAME perfectly
        image: navdeepmm/node-project:latest 
        ports:
        - containerPort: 3000